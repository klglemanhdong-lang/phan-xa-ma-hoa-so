<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bắn Tỉa Siêu Trí Nhớ - Level 3</title>
    <style>
        :root {
            --card-width: 65px;
            --card-height: 85px;
            --primary-red: #d32f2f;
            --gold: #FFD700;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a;
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; user-select: none; 
        }

        #mobile-wrapper {
            width: 100vw; height: 100vh;
            max-width: 430px; 
            max-height: 932px;
            background: #f0f8ff url('b1.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            overflow: hidden;
            border: 1px solid #333;
        }

        /* --- MÀN HÌNH BẮT ĐẦU --- */
        #start-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; padding: 20px; box-sizing: border-box; z-index: 1500;
        }
        #start-screen.hidden { display: none; }
        
        #logo-title {
            font-size: 28px; color: var(--primary-red); text-transform: uppercase;
            font-weight: bold; text-shadow: 0 0 10px #fff; margin-bottom: 20px; text-align: center;
        }

        #review-image {
            width: 90%; max-width: 280px; height: auto;
            border: 3px solid var(--gold); border-radius: 15px;
            box-shadow: 0 0 20px var(--gold); margin-bottom: 25px;
        }

        /* --- UI CHƠI --- */
        #game-ui { display: none; flex-direction: column; width: 100%; height: 100%; padding: 10px; box-sizing: border-box; }
        #game-ui.active { display: flex; }

        #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { color: var(--primary-red); font-size: 18px; text-transform: uppercase; margin: 0; text-shadow: 1px 1px 2px #fff; }
        #lives-display { font-size: 20px; }

        #timer-bar-container {
            width: 100%; height: 22px; background: rgba(0,0,0,0.3);
            border-radius: 11px; overflow: hidden; position: relative;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.3);
        }
        #timer-bar-fill {
            height: 100%; width: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.1s linear;
        }
        #timer-text {
            position: absolute; width: 100%; text-align: center; top: 0;
            font-size: 14px; font-weight: bold; color: white; line-height: 22px;
        }

        .row { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 8px; justify-items: center; margin-bottom: 15px; padding: 0 5px;
        }

        .card { 
            width: var(--card-width); height: var(--card-height); 
            background-color: #fff; border: 2px solid #4CAF50; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.15); 
            position: relative; transition: transform 0.1s;
        }

        .number-card { font-size: 22px; color: #1976D2; font-weight: bold; }
        .image-card { background-color: #FFF9C4; border-color: #FBC02D; }
        .image-card img { width: 85%; height: 55%; object-fit: contain; }
        .image-name { font-size: 9px; color: #333; margin-top: 2px; text-align: center; line-height: 1; }

        /* --- HIỆU ỨNG --- */
        .selected { border: 3px solid #FF5722 !important; transform: scale(1.05); }
        .selected::after { content: "🎯"; position: absolute; top: -8px; right: -8px; font-size: 16px; }
        
        .burning { animation: burn 0.5s forwards; pointer-events: none; }
        @keyframes burn { 100% { opacity: 0; transform: translateY(-20px) scale(0.5); } }
        
        .combo-effect { animation: comboZoomFade 0.8s forwards !important; pointer-events: none; }
        @keyframes comboZoomFade {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.7; border-color: var(--gold); }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .points-popup {
            position: absolute; color: #2E7D32; font-size: 26px; font-weight: bold;
            text-shadow: 0 0 5px #fff; pointer-events: none;
            animation: pointsFly 1s forwards; z-index: 2000;
        }
        @keyframes pointsFly {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }

        /* --- MODALS --- */
        .modal { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); color: white; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 3000; text-align: center;
            padding: 20px; box-sizing: border-box;
        }
        .modal.active { display: flex; }
        
        .action-btn { 
            padding: 15px 35px; font-size: 18px; background: #ff9800; 
            color: white; border: none; border-radius: 30px; cursor: pointer;
            font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .rank-bar { width: 80%; height: 18px; background: #333; border-radius: 10px; margin: 15px 0; border: 2px solid var(--gold); overflow: hidden; }
        .rank-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #FF9800, var(--gold)); transition: width 1s; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div id="mobile-wrapper">
        <div id="start-screen">
            <div id="logo-title">BẮN TỈA TRÍ NHỚ</div>
            <p style="color: var(--gold); margin-bottom: 15px;">Level 3: Ôn tập dãy số mới</p>
            <img src="14-den-19.png" alt="Ôn tập" id="review-image" onerror="this.style.display='none'">
            <button class="action-btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>

        <div id="game-ui">
            <div id="header">
                <h1>LEVEL 3</h1>
                <div id="lives-display">❤️❤️❤️</div>
            </div>

            <div id="timer-bar-container">
                <div id="timer-bar-fill"></div>
                <div id="timer-text"><span id="time-left-num">10</span>s</div>
            </div>

            <div id="top-row" class="row"></div>
            <div id="bottom-row" class="row"></div>
        </div>

        <div id="win-modal" class="modal">
            <h2>QUÁ XUẤT SẮC! 🚀</h2>
            <p>Bạn đã chinh phục Level 3</p>
            <div style="color: #4CAF50; font-size: 24px; font-weight: bold; margin: 10px 0;">+ 400 ĐIỂM</div>
            <p id="total-time-win" style="color: #ccc;">Thời gian: 0 giây</p>
            <div class="rank-bar"><div class="rank-fill" id="win-rank-fill"></div></div>
            <p style="color: var(--gold);">Tiến trình: 1200 / 1600</p>
            <button class="action-btn" onclick="window.location.href='lv4.html'">TIẾP TỤC LEVEL 4 ➔</button>
        </div>

        <div id="lose-modal" class="modal">
            <h2>SẮP ĐƯỢC RỒI! 😢</h2>
            <p>Hãy tập trung và thử lại nhé!</p>
            <button class="action-btn" style="background: var(--primary-red);" onclick="location.reload()">CHƠI LẠI NGAY</button>
        </div>
    </div>

    <script>
        const bgMusic = new Audio('nhac-nen.mp3'); bgMusic.loop = true;
        const reloadSound = new Audio('nap-dan.mp3');
        const boomSound = new Audio('bum.mp3');
        const wrongSound = new Audio('sai.mp3');
        const victorySound = new Audio('chien-thang.mp3');

        const gameData = [
            { id: 3, label: "03", text: "Trái tim" },
            { id: 6, label: "06", text: "Vỏ ốc" },
            { id: 7, label: "07", text: "Cây rìu" },
            { id: 8, label: "08", text: "Người tuyết" },
            { id: 10, label: "10", text: "Con heo" },
            { id: 14, label: "14", text: "Thuyền buồm" },
            { id: 15, label: "15", text: "Túi tiền" },
            { id: 17, label: "17", text: "Nốt nhạc" },
            { id: 19, label: "19", text: "Con chó" }
        ];

        let lives = 3;
        let turnTimeLeft = 10;
        let comboCount = 0;
        let matchedPairs = 0;
        let totalStartTime;
        let timerInterval;
        let selectedId = null;
        let selectedEl = null;
        let isAnimating = false;

        // --- TÍNH NĂNG TEST NHANH ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') handleWin();
            if (e.key.toLowerCase() === 'l') handleLose();
        });

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.add('active');
            lives = 3;
            matchedPairs = 0;
            comboCount = 0;
            totalStartTime = Date.now();
            updateLivesUI();
            renderBoard();
            startTimer();
            bgMusic.play().catch(() => {});
        }

        function renderBoard() {
            const top = document.getElementById('top-row');
            const bottom = document.getElementById('bottom-row');
            top.innerHTML = ''; bottom.innerHTML = '';

            gameData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card number-card';
                card.innerText = item.label;
                card.onclick = () => handleNumberClick(item.id, card);
                top.appendChild(card);
            });

            const shuffled = [...gameData].sort(() => Math.random() - 0.5);
            shuffled.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card image-card';
                card.innerHTML = `<img src="${item.label}.png" onerror="this.style.display='none'"><div class="image-name">${item.text}</div>`;
                card.onclick = () => handleImageClick(item.id, card);
                bottom.appendChild(card);
            });
        }

        function startTimer() {
            clearInterval(timerInterval);
            turnTimeLeft = 10;
            updateTimerUI();
            timerInterval = setInterval(() => {
                turnTimeLeft -= 0.1;
                if (turnTimeLeft <= 0) {
                    clearInterval(timerInterval);
                    takeDamage();
                }
                updateTimerUI();
            }, 100);
        }

        function updateTimerUI() {
            const fill = document.getElementById('timer-bar-fill');
            const num = document.getElementById('time-left-num');
            if (fill && num) {
                fill.style.width = (turnTimeLeft / 10) * 100 + "%";
                num.innerText = Math.ceil(turnTimeLeft);
                fill.style.background = turnTimeLeft < 3 ? "red" : "linear-gradient(90deg, #4CAF50, #8BC34A)";
            }
        }

        function handleNumberClick(id, el) {
            if (isAnimating || el.classList.contains('hidden-card')) return;
            if (selectedEl) selectedEl.classList.remove('selected');
            reloadSound.play().catch(() => {});
            selectedId = id;
            selectedEl = el;
            el.classList.add('selected');
        }

        function handleImageClick(id, el) {
            if (isAnimating || selectedId === null || el.classList.contains('hidden-card')) return;
            isAnimating = true;

            if (selectedId === id) {
                boomSound.play().catch(() => {});
                comboCount++;
                showPopup(el);
                const pair = [el, selectedEl];
                pair.forEach(c => c.classList.add(comboCount >= 3 ? 'combo-effect' : 'burning'));
                setTimeout(() => {
                    pair.forEach(c => c.classList.add('hidden-card'));
                    matchedPairs++;
                    if (matchedPairs === gameData.length) handleWin();
                    else { resetTurn(); startTimer(); }
                }, comboCount >= 3 ? 800 : 500);
            } else {
                takeDamage();
                comboCount = 0;
                el.classList.add('shake');
                setTimeout(() => {
                    el.classList.remove('shake');
                    if(selectedEl) selectedEl.classList.remove('selected');
                    resetTurn();
                }, 500);
            }
        }

        function resetTurn() {
            selectedId = null;
            selectedEl = null;
            isAnimating = false;
        }

        function showPopup(el) {
            const p = document.createElement('div');
            p.className = 'points-popup';
            p.innerText = '+30';
            const rect = el.getBoundingClientRect();
            const wrapperRect = document.getElementById('mobile-wrapper').getBoundingClientRect();
            p.style.left = (rect.left - wrapperRect.left) + "px";
            p.style.top = (rect.top - wrapperRect.top) + "px";
            document.getElementById('mobile-wrapper').appendChild(p);
            setTimeout(() => p.remove(), 1000);
        }

        function takeDamage() {
            wrongSound.play().catch(() => {});
            lives--;
            updateLivesUI();
            document.getElementById('mobile-wrapper').classList.add('shake');
            setTimeout(() => document.getElementById('mobile-wrapper').classList.remove('shake'), 300);
            if (lives <= 0) handleLose();
            else { 
                startTimer(); 
            }
        }

        function updateLivesUI() {
            let h = ''; for(let i=0; i<lives; i++) h += '❤️';
            document.getElementById('lives-display').innerText = h || '💀';
        }

        function handleWin() {
            clearInterval(timerInterval);
            const time = Math.floor((Date.now() - (totalStartTime || Date.now())) / 1000);
            document.getElementById('total-time-win').innerText = `Thời gian: ${time} giây`;
            document.getElementById('game-ui').classList.remove('active');
            document.getElementById('win-modal').classList.add('active');
            setTimeout(() => {
                const fill = document.getElementById('win-rank-fill');
                if (fill) fill.style.width = '75%';
            }, 500);
            victorySound.play().catch(() => {});
        }

        function handleLose() {
            clearInterval(timerInterval);
            document.getElementById('game-ui').classList.remove('active');
            document.getElementById('lose-modal').classList.add('active');
        }
    </script>
</body>
</html>
