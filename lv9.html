<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 9: Sniper Trí Nhớ 3x</title>
    <style>
        :root {
            --primary-cyan: #00E5FF;
            --bg-dark: #0B0C10;
            --gold: #FFD700;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a; color: white; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; user-select: none; 
        }

        #mobile-container {
            width: 100vw; height: 100vh;
            max-width: 430px; max-height: 932px;
            background: var(--bg-dark) url('b2.jpg') no-repeat center center;
            background-size: cover;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #333;
            overflow: hidden;
        }

        #top-bar { 
            display: flex; flex-direction: column; padding: 10px; 
            background: rgba(0, 0, 0, 0.85); border-bottom: 2px solid var(--primary-cyan); z-index: 10; 
        }
        
        .info-row { display: flex; justify-content: space-between; width: 100%; font-size: 14px; }
        #game-title { font-size: 18px; color: var(--primary-cyan); font-weight: bold; text-shadow: 0 0 5px var(--primary-cyan); }

        #sky { position: relative; flex-grow: 1; width: 100%; overflow: hidden; }

        @keyframes fall { from { top: -120px; } to { top: 100%; } }
        
        .meteor { 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            top: -120px; animation: fall 9s linear forwards; z-index: 1; 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; 
            padding: 5px; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); 
        }
        .meteor img { width: 50px; height: 50px; object-fit: contain; }
        .meteor-text { background: #FFEB3B; color: #000; padding: 1px 4px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 3px; }

        /* BỆ BẮN GỌN GÀNG */
        #base { 
            background: rgba(31, 40, 51, 0.95); border-top: 3px solid var(--primary-cyan); 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; z-index: 5;
        }
        .turret-wrapper { display: flex; flex-direction: column; align-items: center; }
        .cannon { font-size: 14px; margin-bottom: -2px; }
        .btn-shoot { 
            width: 100%; padding: 10px 0; font-size: 14px; font-weight: bold; 
            border-radius: 8px; border: 2px solid var(--primary-cyan); 
            background-color: #1f2833; color: var(--primary-cyan); cursor: pointer;
        }
        .btn-shoot:active { background: var(--primary-cyan); color: black; transform: scale(0.9); }

        .laser { position: absolute; background-color: #ff0000; height: 3px; transform-origin: left center; z-index: 4; box-shadow: 0 0 8px #ff0000; animation: laserFade 0.3s forwards; pointer-events: none; }
        @keyframes laserFade { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* MÀN HÌNH ÔN TẬP */
        #review-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin: 15px 0; width: 90%;
        }
        .review-item {
            background: white; border-radius: 8px; padding: 5px;
            display: flex; align-items: center; justify-content: center; aspect-ratio: 1;
            border: 2px solid var(--gold);
        }
        .review-item img { width: 90%; height: 90%; object-fit: contain; }

        .modal { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); flex-direction: column; align-items: center; 
            justify-content: center; z-index: 1000; padding: 20px; text-align: center; box-sizing: border-box;
        }
        .modal.active { display: flex; }
        .action-btn { padding: 14px 30px; font-size: 18px; background: #ff9800; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }

        .rank-bar { width: 80%; height: 15px; background: #333; border-radius: 10px; margin: 15px 0; border: 1px solid var(--gold); overflow: hidden; }
        .rank-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4CAF50, var(--gold)); transition: width 1s; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="mobile-container">
        <div id="top-bar">
            <div id="game-title">BẢO VỆ TRÍ NHỚ - LV9</div>
            <div class="info-row">
                <div id="lives-display">Mạng: ❤️❤️❤️❤️❤️</div>
                <div id="score-container">Mục tiêu: <span id="score">0</span>/10</div>
            </div>
        </div>

        <div id="sky"></div>
        <div id="base"></div>

        <div id="rule-modal" class="modal active">
            <h2 style="color: var(--gold);">ÔN TẬP TRƯỚC KHI BẮN</h2>
            <div id="review-grid">
                <!-- Hình ảnh a32.png -> a39.png sẽ được JS tự động chèn vào đây -->
            </div>
            <p>Sử dụng bộ số 32, 34, 35, 38, 39 để phá hủy thiên thạch!</p>
            <button class="action-btn" onclick="startGame()">BẮT ĐẦU NGAY</button>
        </div>

        <div id="win-modal" class="modal">
            <h2 style="color: var(--gold);">XUẤT SẮC! 🚀</h2>
            <p>Bạn đã hoàn thành Level 9 xuất sắc</p>
            <div style="color: #4CAF50; font-size: 24px; font-weight: bold;">+ 400 ĐIỂM</div>
            <div class="rank-bar"><div class="rank-fill" id="progress-fill"></div></div>
            <p style="font-size: 14px; color: var(--gold);">Tiến trình: 3800 / 3800</p>
            <button class="action-btn" onclick="window.location.href='lv10.html'">TIẾP TỤC LEVEL 10 ➔</button>
        </div>

        <div id="lose-modal" class="modal">
            <h2 style="color: #f44336;">SẮP ĐƯỢC RỒI!</h2>
            <button class="action-btn" onclick="location.reload()">THỬ LẠI ➔</button>
        </div>
    </div>

    <script>
        const bgMusic = new Audio('nhac-nen.mp3'); bgMusic.loop = true;
        const reloadSound = new Audio('nap-dan.mp3');
        const boomSound = new Audio('bum.mp3');
        const wrongSound = new Audio('sai.mp3');
        const victorySound = new Audio('chien-thang.mp3');

        const gameData = [
            { id: 32, label: "32", text: "Vòi sen" },
            { id: 34, label: "34", text: "Dưa hấu" },
            { id: 35, label: "35", text: "Đu đủ" },
            { id: 38, label: "38", text: "Nhẫn" },
            { id: 39, label: "39", text: "Tê giác" }
        ];

        // TỰ ĐỘNG SINH ẢNH ÔN TẬP DỰA TRÊN GAMEDATA
        const reviewGrid = document.getElementById('review-grid');
        gameData.forEach(item => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `<img src="a${item.id}.png">`;
            reviewGrid.appendChild(div);
        });

        let lives = 5; let score = 0;
        let gameActive = false; let isWon = false;
        let meteorQueue = [];
        let spawnTimeout;

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') handleWin();
            if (e.key.toLowerCase() === 'l') handleLose();
        });

        const base = document.getElementById('base');
        gameData.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'turret-wrapper';
            wrapper.innerHTML = `<div class="cannon" id="cannon-${item.id}">🗼</div>
                                 <button class="btn-shoot" onclick="shoot(${item.id})">${item.label}</button>`;
            base.appendChild(wrapper);
        });

        function startGame() {
            document.getElementById('rule-modal').classList.remove('active');
            gameActive = true; isWon = false;
            score = 0; lives = 5;
            document.getElementById('score').innerText = score;
            meteorQueue = [...gameData, ...gameData].sort(() => Math.random() - 0.5);
            updateLivesUI();
            bgMusic.play().catch(() => {});
            spawnNext();
        }

        function spawnNext() {
            if (!gameActive || isWon || meteorQueue.length === 0) return;
            const item = meteorQueue.pop();
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.dataset.id = item.id;
            meteor.dataset.dead = "false";
            meteor.style.left = (Math.random() * 75 + 5) + '%';
            meteor.style.animation = `fall 9s linear forwards`; 
            meteor.innerHTML = `<img src="${item.id}.png"><div class="meteor-text">${item.text}</div>`;
            document.getElementById('sky').appendChild(meteor);

            meteor.addEventListener('animationend', () => {
                if (document.body.contains(meteor)) {
                    if(meteor.dataset.dead === "false" && !isWon) takeDamage();
                    meteor.remove();
                    setTimeout(checkGameState, 200);
                }
            });
            spawnTimeout = setTimeout(spawnNext, 4000);
        }

        function shoot(id) {
            if (!gameActive || isWon) return;
            reloadSound.currentTime = 0; reloadSound.play().catch(() => {});
            const activeMeteors = Array.from(document.getElementsByClassName('meteor'))
                                .filter(m => parseInt(m.dataset.id) === id && m.dataset.dead === "false");
            
            if (activeMeteors.length > 0) {
                const target = activeMeteors.reduce((prev, curr) => (curr.offsetTop > prev.offsetTop) ? curr : prev);
                target.dataset.dead = "true";
                const cannon = document.getElementById('cannon-' + id);
                const cRect = cannon.getBoundingClientRect();
                const tRect = target.getBoundingClientRect();
                const containerRect = document.getElementById('mobile-container').getBoundingClientRect();
                drawLaser(cRect.left + cRect.width/2 - containerRect.left, cRect.top - containerRect.top, tRect.left + tRect.width/2 - containerRect.left, tRect.top + tRect.height/2 - containerRect.top);
                score++;
                document.getElementById('score').innerText = score;
                boomSound.currentTime = 0; boomSound.play().catch(() => {});
                target.innerHTML = '<span style="font-size:50px">💥</span>';
                if (score >= 10) { isWon = true; setTimeout(handleWin, 400); }
                setTimeout(() => { if(target.parentNode) target.remove(); }, 200);
            } else { takeDamage(); }
        }

        function drawLaser(x1, y1, x2, y2) {
            const l = document.createElement('div');
            const len = Math.hypot(x2-x1, y2-y1);
            const ang = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
            l.className = 'laser'; 
            l.style.width = len + 'px'; l.style.left = x1 + 'px'; l.style.top = y1 + 'px'; 
            l.style.transform = `rotate(${ang}deg)`;
            document.getElementById('mobile-container').appendChild(l); 
            setTimeout(() => l.remove(), 200);
        }

        function takeDamage() {
            if(!gameActive || isWon) return;
            wrongSound.play().catch(() => {});
            lives--; updateLivesUI();
            document.getElementById('mobile-container').classList.add('shake');
            setTimeout(() => document.getElementById('mobile-container').classList.remove('shake'), 300);
            if (lives <= 0) handleLose();
        }

        function updateLivesUI() {
            let h = ''; for(let i=0; i<lives; i++) h += '❤️';
            document.getElementById('lives-display').innerText = "Mạng: " + (h || '💀');
        }

        function checkGameState() {
            const remaining = document.querySelectorAll('.meteor[data-dead="false"]').length;
            if (meteorQueue.length === 0 && remaining === 0 && score < 10) handleLose();
        }

        function handleWin() {
            gameActive = false; clearTimeout(spawnTimeout);
            document.getElementById('win-modal').classList.add('active');
            setTimeout(() => document.getElementById('progress-fill').style.width = "100%", 500);
            victorySound.play().catch(() => {});
        }

        function handleLose() {
            gameActive = false; clearTimeout(spawnTimeout);
            document.getElementById('lose-modal').classList.add('active');
        }
    </script>
</body>
</html>
