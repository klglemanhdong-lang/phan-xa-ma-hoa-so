<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 6: Tia Sét Trí Tuệ - Huy Hiệu Vàng</title>
    <style>
        :root {
            --primary-cyan: #00E5FF;
            --bg-dark: #0B0C10;
            --gold: #FFD700;
            --theme-color: #FFC107; 
            --lightning-color: #AEEFF0;
            --lightning-glow: #00E5FF;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a; color: white; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; user-select: none; 
        }

        #mobile-container {
            width: 100vw; height: 100vh;
            max-width: 430px; max-height: 932px;
            background: var(--bg-dark) url('b2.jpg') no-repeat center center;
            background-size: cover;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #333;
            overflow: hidden;
        }

        #top-bar { 
            display: flex; flex-direction: column; padding: 10px; 
            background: rgba(0, 0, 0, 0.85); border-bottom: 2px solid var(--theme-color); z-index: 10; 
        }
        
        .info-row { display: flex; justify-content: space-between; width: 100%; font-size: 14px; }
        #game-title { font-size: 18px; color: var(--theme-color); font-weight: bold; text-shadow: 0 0 5px var(--theme-color); }

        #sky { position: relative; flex-grow: 1; width: 100%; overflow: hidden; }

        @keyframes fall { from { top: -120px; } to { top: 100%; } }
        
        .meteor { 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            top: -120px; animation: fall 9s linear forwards; z-index: 1; 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; 
            padding: 5px; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); 
        }
        .meteor img { width: 50px; height: 50px; object-fit: contain; }
        .meteor-text { background: #FFEB3B; color: #000; padding: 1px 4px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 3px; }

        #base { 
            background: rgba(31, 40, 51, 0.95); border-top: 3px solid var(--theme-color); 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; z-index: 5;
        }
        .turret-wrapper { display: flex; flex-direction: column; align-items: center; }
        .cannon { font-size: 20px; margin-bottom: -5px; }
        .btn-shoot { 
            width: 100%; padding: 12px 0; font-size: 16px; font-weight: bold; 
            border-radius: 10px; border: 2px solid var(--theme-color); 
            background-color: #1f2833; color: var(--theme-color); cursor: pointer;
        }
        .btn-shoot:active { background: var(--theme-color); color: black; transform: scale(0.9); }

        #lightning-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 4;
        }

        .points-popup {
            position: absolute; color: #4CAF50; font-size: 24px; font-weight: bold;
            text-shadow: 0 0 5px #fff; animation: pointsFly 1s forwards; z-index: 100;
        }
        @keyframes pointsFly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }

        .modal { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); flex-direction: column; align-items: center; 
            justify-content: center; z-index: 1000; padding: 20px; text-align: center; box-sizing: border-box;
        }
        .modal.active { display: flex; }

        @keyframes goldGlow {
            0% { filter: drop-shadow(0 0 10px var(--gold)); }
            50% { filter: drop-shadow(0 0 35px #fffde7) drop-shadow(0 0 15px var(--gold)); }
            100% { filter: drop-shadow(0 0 10px var(--gold)); }
        }
        #gold-badge {
            width: 240px; height: auto; margin-bottom: 20px;
            animation: goldGlow 2s infinite ease-in-out;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
        }
        .modal.active #gold-badge { transform: scale(1); }

        #review-img { width: 85%; border: 2px solid var(--theme-color); border-radius: 10px; margin: 15px 0; box-shadow: 0 0 15px var(--theme-color); }
        .rank-bar { width: 80%; height: 15px; background: #333; border-radius: 10px; margin: 15px 0; border: 2px solid var(--gold); overflow: hidden; }
        .rank-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #FFE082, var(--gold)); transition: width 1s; }
        
        .action-btn { padding: 14px 30px; font-size: 18px; background: var(--theme-color); color: black; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="mobile-container">
        <canvas id="lightning-canvas"></canvas>

        <div id="top-bar">
            <div id="game-title">CHINH PHỤC HUY HIỆU VÀNG</div>
            <div class="info-row">
                <div id="lives-display">Mạng: ❤️❤️❤️❤️❤️</div>
                <div id="score-container">Thiên thạch: <span id="score">0</span>/12</div>
            </div>
        </div>

        <div id="sky"></div>
        <div id="base"></div>

        <div id="rule-modal" class="modal active">
            <h2 style="color: var(--gold);">THỬ THÁCH - CẤP VÀNG</h2>
            <img src="20-den-28.png" id="review-img" alt="Ôn tập">
            <p>Phá hủy 12 thiên thạch để nhận HUY HIỆU VÀNG!</p>
            <button class="action-btn" onclick="startGame()">BẮT ĐẦU NGAY</button>
        </div>

        <div id="win-modal" class="modal">
            <img src="3vang.png" id="gold-badge" alt="Huy hiệu Vàng">
            <h2 style="color: var(--gold); text-shadow: 0 0 10px white;">XUẤT SẮC!</h2>
            <p>Bạn đã nhận được HUY HIỆU VÀNG +400 điểm</p>
            <p id="total-time" style="color: #ccc; font-size: 14px;">Thời gian: 0s</p>
            <div class="rank-bar"><div class="rank-fill" id="progress-fill"></div></div>
            <p style="font-size: 12px; color: var(--gold);">Tổng điểm: 2000 / 2000</p>
            <button class="action-btn" onclick="window.location.href='lv7.html'">TIẾP TỤC LEVEL 7 ➔</button>
        </div>

        <div id="lose-modal" class="modal">
            <h2 style="color: #f44336;">CỐ GẮNG LÊN!</h2>
            <button class="action-btn" onclick="location.reload()">CHƠI LẠI ➔</button>
        </div>
    </div>

    <script>
        const bgMusic = new Audio('nhac-nen.mp3'); bgMusic.loop = true;
        const reloadSound = new Audio('nap-dan.mp3');
        const boomSound = new Audio('bum.mp3');
        const wrongSound = new Audio('sai.mp3');
        const victorySound = new Audio('chien-thang.mp3');

        const gameData = [
            { id: 20, label: "20", text: "Quả bom" }, { id: 21, label: "21", text: "Cây nến" },
            { id: 23, label: "23", text: "Con công" }, { id: 25, label: "25", text: "Cần cẩu" },
            { id: 26, label: "26", text: "Gà trống" }, { id: 28, label: "28", text: "Thỏ" }
        ];

        let lives = 5; let score = 0;
        let gameActive = false; let isWon = false; let startTime;
        let meteorQueue = [];
        let spawnTimeout;

        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            const container = document.getElementById('mobile-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- TÍNH NĂNG TEST NHANH ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') handleWin();
            if (e.key.toLowerCase() === 'l') handleLose();
        });

        const base = document.getElementById('base');
        gameData.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'turret-wrapper';
            wrapper.innerHTML = `<button class="btn-shoot" onclick="shoot(${item.id})">${item.label}</button>
                                 <div class="cannon" id="cannon-${item.id}">🗼</div>`;
            base.appendChild(wrapper);
        });

        function startGame() {
            document.getElementById('rule-modal').classList.remove('active');
            gameActive = true; isWon = false; startTime = Date.now();
            score = 0; lives = 5;
            document.getElementById('score').innerText = score;
            
            // TẠO 12 MỤC TIÊU (Mỗi hình 2 lần)
            meteorQueue = [...gameData, ...gameData].sort(() => Math.random() - 0.5);
            
            updateLivesUI();
            bgMusic.play().catch(() => {});
            spawnNext();
        }

        function spawnNext() {
            if (!gameActive || isWon || meteorQueue.length === 0) return;
            const item = meteorQueue.pop();
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            meteor.dataset.id = item.id;
            meteor.dataset.dead = "false";
            meteor.style.left = (Math.random() * 75 + 5) + '%';
            meteor.style.animation = `fall 9s linear forwards`; 
            meteor.innerHTML = `<img src="${item.id}.png"><div class="meteor-text">${item.text}</div>`;
            document.getElementById('sky').appendChild(meteor);

            meteor.addEventListener('animationend', () => {
                if (document.body.contains(meteor)) {
                    if(meteor.dataset.dead === "false" && !isWon) takeDamage();
                    meteor.remove();
                    setTimeout(checkGameState, 200);
                }
            });
            // Tốc độ xuất hiện nhanh hơn một chút cho 12 mục tiêu
            spawnTimeout = setTimeout(spawnNext, 3500);
        }

        function shoot(id) {
            if (!gameActive || isWon) return;
            reloadSound.currentTime = 0; reloadSound.play().catch(() => {});
            
            const activeMeteors = Array.from(document.getElementsByClassName('meteor'))
                                .filter(m => parseInt(m.dataset.id) === id && m.dataset.dead === "false");
            
            if (activeMeteors.length > 0) {
                const target = activeMeteors.reduce((prev, curr) => (curr.offsetTop > prev.offsetTop) ? curr : prev);
                target.dataset.dead = "true";
                
                const cannon = document.getElementById('cannon-' + id);
                const cRect = cannon.getBoundingClientRect();
                const tRect = target.getBoundingClientRect();
                const containerRect = document.getElementById('mobile-container').getBoundingClientRect();

                drawLightning(
                    cRect.left + cRect.width/2 - containerRect.left, 
                    cRect.top - containerRect.top, 
                    tRect.left + tRect.width/2 - containerRect.left, 
                    tRect.top + tRect.height/2 - containerRect.top
                );
                
                score++;
                showPopup(target, "+30");
                document.getElementById('score').innerText = score;
                boomSound.currentTime = 0; boomSound.play().catch(() => {});

                if (score >= 12) {
                    isWon = true;
                    setTimeout(handleWin, 500);
                    target.remove();
                    return;
                }

                target.innerHTML = '<span style="font-size:50px">⚡💥⚡</span>';
                setTimeout(() => { if(target.parentNode) target.remove(); checkGameState(); }, 200);
            } else {
                takeDamage();
            }
        }

        function drawLightning(x1, y1, x2, y2) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const segments = 12;
            const deviation = 18;
            
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            for (let i = 1; i <= segments; i++) {
                let targetX = x1 + (x2 - x1) * (i / segments);
                let targetY = y1 + (y2 - y1) * (i / segments);
                if (i < segments) {
                    targetX += (Math.random() - 0.5) * deviation * 2;
                    targetY += (Math.random() - 0.5) * deviation * 2;
                }
                ctx.lineTo(targetX, targetY);
            }
            ctx.strokeStyle = "#00E5FF";
            ctx.lineWidth = 5;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00E5FF";
            ctx.stroke();

            ctx.strokeStyle = "#FFFFFF";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 0;
            ctx.stroke();

            setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 150);
        }

        function showPopup(target, text) {
            const popup = document.createElement('div');
            popup.className = 'points-popup';
            popup.innerText = text;
            const rect = target.getBoundingClientRect();
            const container = document.getElementById('mobile-container').getBoundingClientRect();
            popup.style.left = (rect.left - container.left) + "px";
            popup.style.top = (rect.top - container.top) + "px";
            document.getElementById('sky').appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function takeDamage() {
            if(!gameActive || isWon) return;
            wrongSound.currentTime = 0; wrongSound.play().catch(() => {});
            lives--;
            updateLivesUI();
            document.getElementById('mobile-container').classList.add('shake');
            setTimeout(() => document.getElementById('mobile-container').classList.remove('shake'), 300);
            if (lives <= 0) handleLose();
        }

        function updateLivesUI() {
            let h = ''; for(let i=0; i<lives; i++) h += '❤️';
            document.getElementById('lives-display').innerText = "Mạng: " + (h || '💀');
        }

        function checkGameState() {
            if (!gameActive || isWon) return;
            const remainingMeteors = document.querySelectorAll('.meteor[data-dead="false"]').length;
            if (meteorQueue.length === 0 && remainingMeteors === 0 && score < 12) {
                handleLose();
            }
        }

        function handleWin() {
            gameActive = false;
            clearTimeout(spawnTimeout);
            const time = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('total-time').innerText = `Thời gian: ${time}s`;
            document.getElementById('win-modal').classList.add('active');
            setTimeout(() => document.getElementById('progress-fill').style.width = "100%", 500);
            victorySound.play().catch(() => {});
        }

        function handleLose() {
            if (!gameActive || isWon) return;
            gameActive = false;
            clearTimeout(spawnTimeout);
            document.getElementById('lose-modal').classList.add('active');
        }
    </script>
</body>
</html>
