<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 20: Huyền Thoại Trí Nhớ</title>
    <style>
        :root {
            --electric: #00FBFF;
            --gold: #FFD700;
            --bg-dark: #050505;
            --card-w: 75px; 
            --card-h: 105px;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background: #000; color: white; 
            margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #mobile-container {
            width: 100vw; height: 100vh; max-width: 430px;
            background: var(--bg-dark) url('b20.jpg') no-repeat center center; background-size: cover;
            position: relative; display: flex; flex-direction: column;
        }

        /* Top Bar */
        #top-bar { padding: 12px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); z-index: 10; }
        .info-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        #timer-bar { width: 100%; height: 6px; background: #222; margin-top: 8px; border-radius: 3px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s linear; }

        /* Grid */
        #grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            padding: 15px; justify-items: center; flex-grow: 1; align-content: center;
        }

        .card {
            width: var(--card-w); height: var(--card-h); background: #fff; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; border: 3px solid #333; position: relative;
        }
        .card.selected { border-color: var(--gold); transform: scale(1.05); z-index: 2; box-shadow: 0 0 15px var(--gold); }
        .card.matched { opacity: 0; pointer-events: none; }
        .card img { width: 85%; height: 60%; object-fit: contain; }
        .card b { font-size: 28px; color: #1a1a1a; }
        .card span { font-size: 10px; color: #555; font-weight: bold; text-align: center; margin-top: 4px; }

        #lightning-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 100; }

        /* Modals */
        .modal { 
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; padding: 20px; text-align: center;
        }
        .modal.active { display: flex; }

        /* Review Image Area */
        .review-box {
            width: 100%; max-width: 320px; margin: 15px 0;
            border: 2px solid var(--gold); border-radius: 10px;
            overflow: hidden; background: #fff;
        }
        .review-box img { width: 100%; display: block; }

        .rank-bar { width: 100%; height: 15px; background: #333; border-radius: 10px; margin: 15px 0; border: 1px solid var(--gold); overflow: hidden; }
        .rank-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffd700, #fff); transition: width 2.5s cubic-bezier(0.1, 0, 0.3, 1); }
        
        .action-btn { 
            padding: 16px 45px; font-size: 20px; background: var(--gold); 
            color: #000; border: none; border-radius: 40px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div id="mobile-container">
    <canvas id="lightning-canvas"></canvas>

    <div id="top-bar">
        <div class="info-row">
            <span id="lives-ui">❤️ ❤️ ❤️ ❤️ ❤️</span>
            <span style="color: var(--gold)">LV20: HUYỀN THOẠI</span>
            <span>Khớp: <span id="score-ui">0</span>/10</span>
        </div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
    </div>

    <div id="grid"></div>

    <div id="start-modal" class="modal active">
        <h1 style="color: var(--gold); font-size: 28px; margin-bottom: 5px;">THỬ THÁCH 70 ĐẾN 79</h1>
        
        <div class="review-box">
            <img src="70-79.jpg" alt="Ôn tập">
        </div>

        <p style="font-size: 14px; line-height: 1.4; color: #ccc;">Ghi nhớ bảng mã trên để bước vào ngôi đền<br><b>HUYỀN THOẠI TRÍ NHỚ</b></p>
        
        <button class="action-btn" style="margin-top: 15px;" onclick="startGame()">KHAI HỎA</button>
    </div>

    <div id="win-modal" class="modal">
        <h1 style="color: var(--gold); margin: 0; font-size: 38px;">XUẤT SẮC!</h1>
        <p style="margin: 10px 0; color: #fff;">Bạn đã hoàn thành bộ số 70-79.</p>
        
        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; width: 100%; box-sizing: border-box;">
            <div style="color: var(--gold); font-size: 24px; font-weight: bold;">LEVEL 20 HOÀN TẤT</div>
            <div id="finish-time" style="color: #fff; font-size: 15px; margin-top: 5px;">Thời gian: 0 giây</div>
            <div class="rank-bar"><div class="rank-fill" id="progress-fill"></div></div>
            <div style="display: flex; justify-content: space-between; font-size: 11px; color: #aaa;">
                <span>TIẾN TỚI LV21</span>
                <span style="color: var(--gold);">RANK: LEGENDARY</span>
            </div>
        </div>
        
        <button class="action-btn" style="margin-top: 25px;" onclick="nextLevel()">TIẾP TỤC ➔</button>
    </div>

    <div id="lose-modal" class="modal">
        <h1 style="color: #ff5252;">THẤT BẠI!</h1>
        <p>Áp lực quá lớn? Hãy bình tĩnh và thử lại.</p>
        <button class="action-btn" onclick="location.reload()">THỬ LẠI</button>
    </div>
</div>

<script>
    const bgMusic = new Audio('nhac-nen.mp3'); bgMusic.loop = true;
    const zapSound = new Audio('bum.mp3');
    const wrongSound = new Audio('sai.mp3');

    const gameNumbers = [70, 71, 72, 73, 74, 75, 76, 77, 78, 79];
    const dataDetails = {
        70: "Sầu riêng", 71: "Lá cờ", 72: "Con ma", 73: "Trâu", 74: "Con đường",
        75: "Xe tăng", 76: "Nước mía", 77: "Súng", 78: "Cà chua", 79: "Dừa"
    };

    let lives = 5, score = 0, timeLeft = 45, timer, selected = null, startTime;
    const canvas = document.getElementById('lightning-canvas');
    const ctx = canvas.getContext('2d');

    let inputBuffer = "";
    let inputTimeout;

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 't') handleWin();
        if (e.key.toLowerCase() === 'l') handleLose();
        if (e.key >= '0' && e.key <= '9') {
            clearTimeout(inputTimeout);
            inputBuffer += e.key;
            if (inputBuffer.length === 2) {
                window.location.href = `lv${inputBuffer}.html`;
                inputBuffer = "";
            }
            inputTimeout = setTimeout(() => { inputBuffer = ""; }, 800);
        }
    });

    function resize() {
        canvas.width = document.getElementById('mobile-container').clientWidth;
        canvas.height = document.getElementById('mobile-container').clientHeight;
    }
    window.addEventListener('resize', resize); resize();

    function startGame() {
        document.getElementById('start-modal').classList.remove('active');
        startTime = Date.now();
        bgMusic.play().catch(() => {});
        renderCards();
        startTimer();
    }

    function renderCards() {
        const grid = document.getElementById('grid');
        let cards = [];
        gameNumbers.forEach(num => {
            cards.push({ id: num, html: `<b>${num}</b>` });
            cards.push({ id: num, html: `<img src="${num}.png"><span>${dataDetails[num]}</span>` });
        });
        cards.sort(() => Math.random() - 0.5);
        grid.innerHTML = '';
        cards.forEach(c => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = c.html;
            div.onclick = () => handleChoice(c.id, div);
            grid.appendChild(div);
        });
    }

    function handleChoice(id, el) {
        if (el.classList.contains('matched') || el === selected?.el) return;
        if (!selected) {
            selected = { id, el };
            el.classList.add('selected');
        } else {
            if (selected.id === id) {
                drawLightning(selected.el, el);
                const p1 = selected.el; const p2 = el;
                p2.classList.add('selected');
                score++;
                document.getElementById('score-ui').innerText = score;
                zapSound.currentTime = 0; zapSound.play();
                setTimeout(() => {
                    p1.classList.add('matched'); p2.classList.add('matched');
                    selected = null;
                    if (score === 10) handleWin();
                }, 300);
            } else { takeDamage(el); }
        }
    }

    function drawLightning(el1, el2) {
        const r1 = el1.getBoundingClientRect();
        const r2 = el2.getBoundingClientRect();
        const container = document.getElementById('mobile-container').getBoundingClientRect();
        let x1 = r1.left + r1.width/2 - container.left;
        let y1 = r1.top + r1.height/2 - container.top;
        let x2 = r2.left + r2.width/2 - container.left;
        let y2 = r2.top + r2.height/2 - container.top;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath(); ctx.moveTo(x1, y1);
        for(let i=0; i<10; i++) {
            ctx.lineTo(x1+(x2-x1)*i/10 + (Math.random()-0.5)*25, y1+(y2-y1)*i/10 + (Math.random()-0.5)*25);
        }
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = "#FFD700";
        ctx.stroke();
        setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 150);
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer-fill').style.width = (timeLeft/45)*100 + "%";
            if (timeLeft <= 0) { clearInterval(timer); handleLose(); }
        }, 100);
    }

    function takeDamage(el) {
        wrongSound.play();
        lives--;
        document.getElementById('lives-ui').innerText = "❤️ ".repeat(lives) || "💀";
        el.classList.add('shake');
        if(selected) selected.el.classList.remove('selected');
        selected = null;
        setTimeout(() => el.classList.remove('shake'), 300);
        if (lives <= 0) handleLose();
    }

    function handleWin() {
        clearInterval(timer);
        const time = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('finish-time').innerText = `Thời gian hoàn thành: ${time} giây`;
        document.getElementById('win-modal').classList.add('active');
        setTimeout(() => { document.getElementById('progress-fill').style.width = "100%"; }, 500);
    }

    function handleLose() {
        clearInterval(timer);
        document.getElementById('lose-modal').classList.add('active');
    }

    function nextLevel() {
        window.location.href = 'lv21.html';
    }
</script>
</body>
</html>
